<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc nghiệm 50 Từ Vựng: EP14 - Lợi ích của việc học ngôn ngữ</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f6; 
            color: #333; 
            margin: 0; 
            padding: 20px; 
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: #2c3e50; font-size: 1.8em; margin-bottom: 20px; line-height: 1.4;}
        
        /* Bảng điểm ghim trên cùng */
        .score-banner {
            position: sticky;
            top: 10px;
            background: #27ae60;
            color: #fff;
            padding: 15px;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            z-index: 100;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Thẻ chứa từng câu hỏi */
        .question-card { 
            background: #fff; 
            border-radius: 12px; 
            padding: 25px; 
            margin-bottom: 25px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.08); 
            border-top: 5px solid #bdc3c7;
        }
        .q-header { font-size: 0.9em; color: #7f8c8d; font-weight: bold; margin-bottom: 10px; text-transform: uppercase;}
        .q-word { font-size: 2.5em; font-weight: bold; color: #2c3e50; margin-bottom: 20px; text-align: center; }
        
        /* Lưới đáp án */
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 600px) { .options { grid-template-columns: 1fr; } }
        
        .opt-btn { 
            padding: 15px; font-size: 1.05em; border: 2px solid #e0e6ed; 
            border-radius: 8px; background: #fff; cursor: pointer; 
            transition: 0.2s; text-align: center; font-weight: 500; color: #34495e;
        }
        .opt-btn:hover:not(:disabled) { border-color: #27ae60; background: #eaeded; }
        .opt-btn:disabled { cursor: default; }
        
        /* Màu sắc khi Chọn Đúng / Sai */
        .opt-btn.correct { background: #d4edda; border-color: #28a745; color: #155724; }
        .opt-btn.wrong { background: #f8d7da; border-color: #dc3545; color: #721c24; }
        
        /* Hộp giải thích */
        .explanation { 
            margin-top: 20px; padding: 15px; border-radius: 8px; 
            background: #fdfefe; border-left: 5px solid #f39c12; line-height: 1.6;
            animation: fadeIn 0.4s ease-in-out;
            font-size: 0.95em;
        }
        .explanation strong { color: #d35400; font-size: 1.1em;}
        .explanation .meaning { margin-bottom: 10px; color: #34495e; }
        
        /* Label Hán Việt tách chữ */
        .han-viet-box {
            display: block; background: #fef9e7; color: #b9770e; 
            padding: 12px; border-radius: 5px; font-size: 0.95em; 
            margin-top: 10px; border: 1px solid #f5b041;
        }
        .han-viet-box span { font-weight: bold; color: #d35400; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Bài tập Trắc nghiệm: 50 Từ vựng Khó (B2~C1)<br> Giải thích chi tiết gốc Hán Hàn</h1>
    <div class="score-banner" id="score-text">Điểm: 0 / 0 (Đã làm: 0/50)</div>
    <div id="quiz-container"></div>
</div>

<script>
// Dữ liệu 50 từ vựng với giải thích bóc tách Hán Hàn
const vocabList = [
    { kr: "한파", vn: "Đợt rét đậm", detail: "Chỉ đợt không khí lạnh khắc nghiệt vào mùa đông.", han: "<span>한</span> (Hàn: lạnh) + <span>파</span> (Ba: làn sóng) ➔ Làn sóng lạnh." },

    { kr: "추적", vn: "Sự theo dõi, truy vết", detail: "Việc bám theo dấu vết để tìm ra hoặc quan sát sự thay đổi.", han: "<span>추</span> (Truy: đuổi theo) + <span>적</span> (Tích: dấu vết) ➔ Đuổi theo dấu vết." },
    { kr: "인지하다", vn: "Nhận thức, nhận biết", detail: "Khả năng nhận ra, hiểu rõ sự việc thông qua tư duy.", han: "<span>인</span> (Nhận: nhận ra) + <span>지</span> (Tri: biết) ➔ Nhận biết." },
    { kr: "치매", vn: "Chứng mất trí nhớ", detail: "Căn bệnh suy giảm trí nhớ thường gặp ở người già.", han: "<span>치</span> (Si: ngu ngốc) + <span>매</span> (Ngốc/Mê: lú lẫn) ➔ Bệnh lú lẫn." },
    { kr: "예방하다", vn: "Dự phòng, phòng ngừa", detail: "Ngăn chặn trước những việc xấu, bệnh tật xảy ra.", han: "<span>예</span> (Dự: trước) + <span>방</span> (Phòng: phòng bị) ➔ Phòng bị trước." },

    { kr: "압박", vn: "Sự đè nén, áp lực", detail: "Sự áp chế, tạo áp lực nặng nề về tâm lý hoặc vật lý.", han: "<span>압</span> (Áp: đè xuống) + <span>박</span> (Bách: thúc ép) ➔ Đè ép." },

    { kr: "동기부여", vn: "Sự tạo động lực", detail: "Việc tiếp thêm lý do, sức mạnh để làm một việc gì đó.", han: "<span>동</span> (Động: di chuyển) + <span>기</span> (Cơ: mầm mống) + <span>부여</span> (Thuần Hàn: Trao cho) ➔ Cấp cho động cơ." },

    { kr: "해방감", vn: "Cảm giác được giải phóng", detail: "Cảm giác nhẹ nhõm, tự do khi thoát khỏi áp lực.", han: "<span>해</span> (Giải: cởi ra) + <span>방</span> (Phóng: thả ra) + <span>감</span> (Cảm: cảm giác) ➔ Cảm giác tự do." },

    { kr: "단조롭다", vn: "Đơn điệu, tẻ nhạt", detail: "Sự việc cứ lặp đi lặp lại không có gì mới mẻ.", han: "<span>단</span> (Đơn: một) + <span>조</span> (Điệu: nhịp/giai điệu) + <span>롭다</span> (Đuôi thuần Hàn) ➔ Chỉ có một màu/nhịp." },
    { kr: "여유", vn: "Sự thong thả, dư dả", detail: "Có dư dả thời gian, tiền bạc hoặc tâm trí không vội vã.", han: "<span>여</span> (Dư: thừa ra) + <span>유</span> (Dụ: khoan thai) ➔ Sự nhàn nhã." },
    { kr: "검붉다", vn: "Đỏ sẫm", detail: "Màu đỏ pha đen, đỏ tối màu.", han: "🌱 <span>Từ thuần Hàn ghép:</span> 검다 (Đen) + 붉다 (Đỏ)." },

    { kr: "서툴다", vn: "Vụng về, lóng ngóng", detail: "Làm việc gì đó chưa quen, thiếu kinh nghiệm.", han: "🌱 <span>Từ thuần Hàn.</span>" },
    { kr: "안쓰럽다", vn: "Đáng thương", detail: "Cảm giác nhìn ai đó thấy xót xa trong lòng.", han: "🌱 <span>Từ thuần Hàn.</span>" },
    { kr: "꾸준히", vn: "Đều đặn, kiên trì", detail: "Làm việc gì đó liên tục, không bỏ cuộc.", han: "🌱 <span>Từ thuần Hàn.</span>" }
];

// Tạo cấu trúc câu hỏi có xáo trộn đáp án
const quizData = vocabList.map((item, index) => {
    let pool = vocabList.filter((_, i) => i !== index);
    pool.sort(() => 0.5 - Math.random());
    let distractors = [pool[0].vn, pool[1].vn, pool[2].vn];
    
    let options = [...distractors, item.vn];
    options.sort(() => 0.5 - Math.random());
    
    return {
        kr: item.kr,
        options: options,
        correctIndex: options.indexOf(item.vn),
        answerText: item.vn,
        detail: item.detail,
        han: item.han
    };
});

let score = 0;
let answeredCount = 0;
const container = document.getElementById('quiz-container');

// Render 50 câu hỏi
function renderQuiz() {
    let html = '';
    quizData.forEach((q, qIndex) => {
        html += `
        <div class="question-card" id="q-card-${qIndex}">
            <div class="q-header">Câu ${qIndex + 1} / 50</div>
            <div class="q-word">${q.kr}</div>
            <div class="options" id="opts-${qIndex}">
                ${q.options.map((opt, oIndex) => `
                    <button class="opt-btn" onclick="checkAns(${qIndex}, ${oIndex}, this)">${opt}</button>
                `).join('')}
            </div>
            <div class="explanation" id="exp-${qIndex}" style="display:none;">
                <strong>Đáp án đúng: ${q.answerText}</strong>
                <div class="meaning"><em>Giải nghĩa:</em> ${q.detail}</div>
                <div class="han-viet-box">🔍 Phân tích: ${q.han}</div>
            </div>
        </div>
        `;
    });
    container.innerHTML = html;
}

// Xử lý chấm điểm
function checkAns(qIndex, selectedIndex, btnElement) {
    const q = quizData[qIndex];
    const optionsDiv = document.getElementById(`opts-${qIndex}`);
    const buttons = optionsDiv.querySelectorAll('.opt-btn');
    
    buttons.forEach((btn, idx) => {
        btn.disabled = true;
        if (idx === q.correctIndex) {
            btn.classList.add('correct');
        } else if (idx === selectedIndex) {
            btn.classList.add('wrong');
        }
    });
    
    answeredCount++;
    if (selectedIndex === q.correctIndex) {
        score++;
    }
    
    document.getElementById('score-text').innerText = `Điểm: ${score} / ${answeredCount} (Đã làm: ${answeredCount}/50)`;
    document.getElementById(`exp-${qIndex}`).style.display = 'block';
}

window.onload = renderQuiz;
</script>
